[build]
  command = "npm install --include=dev && npm run build"
  publish = "dist"

[build.environment]
  NPM_CONFIG_PRODUCTION = "false"

[[redirects]]
  from = "/health"
  to = "https://record-production.up.railway.app/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://record-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
