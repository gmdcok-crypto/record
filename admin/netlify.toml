[build]
  command = "npm install --include=dev && npm run build"
  publish = "dist"

[build.environment]
  NPM_CONFIG_PRODUCTION = "false"
  VITE_API_URL = "https://record-production.up.railway.app"
  VITE_ADMIN_BUILD = "$COMMIT_REF"

[[redirects]]
  from = "/health"
  to = "https://record-production.up.railway.app/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://record-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/admin-push-sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
