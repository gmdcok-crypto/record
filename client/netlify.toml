[build]
  command = "npm run build"
  publish = "dist"

# Do NOT set VITE_API_URL on Netlify. The client proxies /api/* to Railway via same-origin.

# Small JSON API calls can be proxied, but the client now calls Railway directly
# for uploads and payment flows to avoid Netlify timeout/body-size limits.
[[redirects]]
  from = "/health"
  to = "https://record-production.up.railway.app/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://record-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/share/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# PWA update: never long-cache the service worker shell or entry HTML.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
