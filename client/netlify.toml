[build]
  command = "npm run build"
  publish = "dist"

# Small JSON API calls can be proxied, but the client now calls Railway directly
# for uploads and payment flows to avoid Netlify timeout/body-size limits.
[[redirects]]
  from = "/health"
  to = "https://record-production.up.railway.app/health"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://record-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/share/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
